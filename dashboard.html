<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mastodon Marketing - LinkedIn Content</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@latest/font/lucide.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; }

/* Header */
.header { background: #553d67; border-bottom: none; padding: 0 32px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
.header-left { display: flex; align-items: center; gap: 12px; }
.logo-icon { width: 36px; height: 36px; background: #ffffff; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; color: #553d67; }
.header h1 { font-size: 17px; font-weight: 600; color: #ffffff; letter-spacing: -0.3px; }
.header h1 span { color: #ffffff; }
.header-actions { display: flex; gap: 8px; }
.btn-header { background: rgba(255,255,255,0.15); color: #ffffff; border: 1px solid rgba(255,255,255,0.3); padding: 7px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; font-family: inherit; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
.btn-header:hover { background: rgba(255,255,255,0.25); border-color: rgba(255,255,255,0.5); }
.btn-header.primary { background: #ffffff; color: #553d67; border-color: #ffffff; font-weight: 700; }
.btn-header.primary:hover { background: #f0f0f0; }

/* Tabs */
.tabs { background: #ffffff; border-bottom: 1px solid #e0e0e0; padding: 0 32px; display: flex; gap: 0; }
.tab { padding: 12px 20px; font-size: 13px; font-weight: 500; color: #888888; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
.tab:hover { color: #553d67; }
.tab.active { color: #553d67; border-bottom-color: #553d67; }
.tab-count { background: #f0f0f0; color: #666666; font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 600; }
.tab.active .tab-count { background: #553d67; color: #ffffff; }

/* Main */
.main { max-width: 960px; margin: 0 auto; padding: 24px 24px 80px; }

/* Empty state */
.empty { text-align: center; padding: 100px 20px; }
.empty-icon { width: 64px; height: 64px; background: #ffffff; border-radius: 16px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.empty h2 { font-size: 20px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
.empty p { color: #666666; font-size: 14px; max-width: 400px; margin: 0 auto; line-height: 1.6; }

/* Cards */
.card { background: #ffffff; border: 1px solid #e0e0e0; border-radius: 14px; margin-bottom: 16px; overflow: hidden; transition: border-color 0.2s, box-shadow 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
.card:hover { border-color: #553d67; box-shadow: 0 4px 16px rgba(85,61,103,0.1); }
.card.published { opacity: 0.7; }
.card.rejected { opacity: 0.5; }

.card-top { padding: 16px 20px; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
.card-top-left { display: flex; flex-direction: column; gap: 8px; }
.card-topic { font-size: 18px; font-weight: 700; color: #1a1a1a; line-height: 1.4; }
.card-badges { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.badge { padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.badge-growth { background: #e8f5e9; color: #2e7d32; }
.badge-authority { background: #ede7f6; color: #553d67; }
.badge-conversion { background: #f3e5f5; color: #7b1fa2; }
.badge-personal { background: #fff3e0; color: #e65100; }
.badge-seo { background: #e3f2fd; color: #1565c0; }
.badge-pending { background: #fff8e1; color: #f57f17; border: 1px solid #ffe082; }
.badge-scheduled { background: #ede7f6; color: #553d67; border: 1px solid #ce93d8; }
.scheduled-date { font-size: 13px; color: #553d67; font-weight: 600; margin-top: 4px; }
.schedule-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 6px; }
.date-input { padding: 5px 10px; border: 1px solid #d0d0d0; border-radius: 6px; font-size: 12px; font-family: inherit; color: #1a1a1a; background: #fafafa; }
.badge-published { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
.badge-rejected { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
.card-date { font-size: 12px; color: #888888; white-space: nowrap; padding-top: 2px; }

/* Scores */
.scores { display: flex; gap: 16px; padding: 0 20px 12px; }
.score-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #666666; }
.score-value { font-weight: 700; color: #1a1a1a; }
.score-bar { width: 40px; height: 4px; background: #e0e0e0; border-radius: 2px; overflow: hidden; }
.score-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
.score-fill.good { background: #22c55e; }
.score-fill.mid { background: #f59e0b; }
.score-fill.low { background: #ef4444; }

/* Draft content */
.draft-section { padding: 0 20px 16px; }
.draft-text { white-space: pre-wrap; line-height: 1.8; font-size: 15px; color: #1a1a1a; padding: 16px 20px; background: #fafafa; border-radius: 10px; border: 1px solid #e8e8e8; max-height: 350px; overflow-y: auto; }
.draft-text::-webkit-scrollbar { width: 4px; }
.draft-text::-webkit-scrollbar-thumb { background: #cccccc; border-radius: 2px; }

/* Image suggestion */
.image-suggestion { margin: 12px 20px 0; padding: 10px 14px; background: #f3edf6; border: 1px dashed #553d67; border-radius: 8px; font-size: 13px; color: #553d67; display: flex; align-items: flex-start; gap: 8px; }
.image-suggestion::before { content: '🖼'; font-size: 14px; flex-shrink: 0; }

/* Source link */
.source { padding: 0 20px; margin-top: 10px; }
.source a { font-size: 13px; color: #553d67; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; font-weight: 500; }
.source a:hover { color: #6b4f80; text-decoration: underline; }

/* QC Feedback */
.qc-section { margin: 12px 20px 16px; padding: 12px 14px; background: #fafafa; border: 1px solid #e8e8e8; border-radius: 8px; }
.qc-header { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #553d67; margin-bottom: 6px; }
.qc-text { font-size: 13px; color: #333333; line-height: 1.5; }

/* Actions */
.card-actions { padding: 14px 20px; border-top: 1px solid #e8e8e8; display: flex; gap: 8px; align-items: stretch; flex-wrap: wrap; }
.btn { padding: 8px 18px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; font-family: inherit; display: inline-flex; align-items: center; gap: 6px; }
.btn:active { transform: scale(0.97); }
.btn-approve { background: #00c853; color: #ffffff; font-weight: 700; }
.btn-approve:hover { background: #00e676; box-shadow: 0 4px 16px rgba(0,200,83,0.3); }
.btn-reject { background: #ff1744; color: #ffffff; font-weight: 700; }
.btn-reject:hover { background: #ff5252; box-shadow: 0 4px 16px rgba(255,23,68,0.3); }
.btn-rewrite { background: #553d67; color: #ffffff; font-weight: 700; }
.btn-rewrite:hover { background: #6b4f80; box-shadow: 0 4px 16px rgba(85,61,103,0.3); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* Rewrite area */
.rewrite-area { display: none; padding: 0 20px 16px; }
.rewrite-area.show { display: block; }
.rewrite-textarea { width: 100%; min-height: 80px; padding: 12px; background: #fafafa; border: 1px solid #d0d0d0; border-radius: 8px; color: #1a1a1a; font-size: 13px; font-family: inherit; resize: vertical; line-height: 1.5; }
.rewrite-textarea:focus { outline: none; border-color: #553d67; box-shadow: 0 0 0 3px rgba(85,61,103,0.15); }
.rewrite-submit { margin-top: 8px; }

/* Confirm dialog */
.confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); animation: fadeIn 0.15s; }
.confirm-box { background: #ffffff; border: 1px solid #e0e0e0; border-radius: 14px; padding: 24px; max-width: 400px; width: 90%; box-shadow: 0 16px 48px rgba(0,0,0,0.15); }
.confirm-box h3 { font-size: 16px; color: #1a1a1a; margin-bottom: 8px; }
.confirm-box p { font-size: 14px; color: #666666; line-height: 1.5; margin-bottom: 20px; }
.confirm-actions { display: flex; gap: 8px; justify-content: flex-end; }

/* Toast */
.toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; z-index: 200; animation: slideUp 0.3s ease; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
.toast-success { background: #00c853; color: #ffffff; }
.toast-error { background: #ff1744; color: #ffffff; }

/* Loading spinner */
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(85,61,103,0.3); border-top-color: #553d67; border-radius: 50%; animation: spin 0.6s linear infinite; }
.loading-state { text-align: center; padding: 80px 20px; color: #888888; }
.loading-state .spinner { width: 32px; height: 32px; border-width: 3px; margin-bottom: 16px; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes spin { to { transform: rotate(360deg); } }

/* Mobile */
@media (max-width: 640px) {
  .header { padding: 0 16px; }
  .tabs { padding: 0 16px; overflow-x: auto; }
  .main { padding: 16px; }
  .card-top { flex-direction: column; }
  .scores { flex-wrap: wrap; }
  .card-actions { flex-direction: column; }
  .btn { justify-content: center; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo-icon">M</div>
    <h1><span>Mastodon</span> LinkedIn</h1>
  </div>
  <div class="header-actions">
    <button class="btn-header" onclick="loadDrafts()" id="refreshBtn">Refresh</button>
    <button class="btn-header" onclick="generateDraft()" id="generateBtn">+ New Draft</button>
    <button class="btn-header primary" onclick="generateBatch()" id="batchBtn">Generate 5 Posts</button>
  </div>
</div>

<div class="tabs" id="tabs">
  <div class="tab active" data-filter="all">Needs Attention <span class="tab-count" id="count-all">0</span></div>
  <div class="tab" data-filter="pending">Pending <span class="tab-count" id="count-pending">0</span></div>
  <div class="tab" data-filter="scheduled">Scheduled <span class="tab-count" id="count-scheduled">0</span></div>
  <div class="tab" data-filter="published">Published <span class="tab-count" id="count-published">0</span></div>
  <div class="tab" data-filter="rejected">Rejected <span class="tab-count" id="count-rejected">0</span></div>
</div>

<div class="main" id="main">
  <div class="loading-state"><div class="spinner"></div><br>Loading drafts...</div>
</div>

<script>
const SUPABASE_URL = 'https://vaaudpclqxaqzlryhhlm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZhYXVkcGNscXhhcXpscnloaGxtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMzc3NDEsImV4cCI6MjA5MTcxMzc0MX0.R7iLNsyHAc-Ky_ri1tP5DovcECYu_jTqpi1-3GjobJg';

const hdrs = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' };
let allDrafts = [];
let currentFilter = 'all';

// Tabs
document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentFilter = tab.dataset.filter;
  renderDrafts();
});

function escapeHtml(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

function getStatus(s) {
  if (!s) return 'pending';
  const l = s.toLowerCase();
  if (l.includes('scheduled')) return 'scheduled';
  if (l.includes('publish')) return 'published';
  if (l.includes('reject')) return 'rejected';
  return 'pending';
}

function formatDraft(text) {
  if (!text) return '';
  let imageMatch = text.match(/\[IMAGE:([^\]]+)\]/i);
  let imageSuggestion = imageMatch ? imageMatch[1].trim() : null;
  let clean = text.replace(/\[IMAGE:[^\]]+\]\s*/gi, '').trim();
  return { clean: escapeHtml(clean), imageSuggestion };
}

function formatFeedback(fb) {
  if (!fb) return '';
  try {
    if (fb.startsWith('{')) {
      const obj = JSON.parse(fb);
      if (obj.feedback) return escapeHtml(obj.feedback);
      let parts = [];
      for (const [k, v] of Object.entries(obj)) {
        if (typeof v === 'object' && v.score) parts.push(`${k.replace(/_/g,' ')}: ${v.score}/10`);
      }
      return parts.length ? parts.join(' | ') : escapeHtml(fb);
    }
  } catch {}
  return escapeHtml(fb.substring(0, 300));
}

function scoreColor(score) {
  if (score >= 7) return 'good';
  if (score >= 5) return 'mid';
  return 'low';
}

async function loadDrafts() {
  const main = document.getElementById('main');
  main.innerHTML = '<div class="loading-state"><div class="spinner"></div><br>Loading drafts...</div>';
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/linkedin_drafts?order=created_at.desc`, { headers: hdrs });
    allDrafts = await res.json();
    renderDrafts();
  } catch (err) {
    main.innerHTML = `<div class="empty"><div class="empty-icon">!</div><h2>Could not load drafts</h2><p>${err.message}</p></div>`;
  }
}

function renderDrafts() {
  const main = document.getElementById('main');
  let pending = 0, published = 0, rejected = 0, scheduled = 0;
  allDrafts.forEach(r => { const s = getStatus(r.status); if (s === 'scheduled') scheduled++; else if (s === 'published') published++; else if (s === 'rejected') rejected++; else pending++; });

  document.getElementById('count-all').textContent = pending;
  document.getElementById('count-pending').textContent = pending;
  document.getElementById('count-scheduled').textContent = scheduled;
  document.getElementById('count-published').textContent = published;
  document.getElementById('count-rejected').textContent = rejected;

  const filtered = currentFilter === 'all' ? allDrafts.filter(r => getStatus(r.status) === 'pending') : allDrafts.filter(r => getStatus(r.status) === currentFilter);

  if (!filtered.length) {
    const msgs = { all: ['📝', 'Needs Attention', 'No posts need your attention right now. Click "+ New Draft" to generate one.'], pending: ['⏳', 'pending', 'No drafts with this status yet.'], scheduled: ['📅', 'scheduled', 'No posts scheduled yet. Approve a pending draft to schedule it.'], published: ['✅', 'published', 'No posts published yet.'], rejected: ['🗑', 'rejected', 'No rejected posts.'] };
    const m = msgs[currentFilter] || msgs.all;
    main.innerHTML = `<div class="empty"><div class="empty-icon">${m[0]}</div><h2>No ${m[1]} drafts</h2><p>${m[2]}</p></div>`;
    return;
  }

  main.innerHTML = filtered.map(row => {
    const status = getStatus(row.status);
    const { clean, imageSuggestion } = formatDraft(row.draft);
    const date = row.created_at ? new Date(row.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';
    const qc = row.qc_score ? parseFloat(row.qc_score) : 0;
    const isPending = status === 'pending';
    const isScheduled = status === 'scheduled';
    const schedDate = row.scheduled_for ? new Date(row.scheduled_for) : null;
    const schedStr = schedDate ? schedDate.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' }) + ' at ' + schedDate.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' }) : '';

    return `
    <div class="card ${status}" id="card-${row.id}">
      <div class="card-top">
        <div class="card-top-left">
          <div class="card-topic">${escapeHtml(row.topic) || 'Untitled Draft'}</div>
          <div class="card-badges">
            <span class="badge badge-${(row.bucket||'').toLowerCase()}">${row.bucket || 'N/A'}</span>
            <span class="badge badge-${status}">${row.status || 'Pending Review'}</span>
          </div>
        </div>
        <span class="card-date">${date}</span>
      </div>

      <div class="scores">
        <div class="score-item">QC <span class="score-value">${qc || '?'}/10</span>
          <div class="score-bar"><div class="score-fill ${scoreColor(qc)}" style="width:${qc*10}%"></div></div>
        </div>
        <div class="score-item">Urgency <span class="score-value">${row.urgency || '?'}/10</span>
          <div class="score-bar"><div class="score-fill ${scoreColor(row.urgency)}" style="width:${(row.urgency||0)*10}%"></div></div>
        </div>
      </div>

      <div class="draft-section">
        <div class="draft-text">${clean}</div>
      </div>

      ${imageSuggestion ? `<div class="image-suggestion">${escapeHtml(imageSuggestion)}</div>` : ''}

      ${row.source_url ? `<div class="source"><a href="${escapeHtml(row.source_url)}" target="_blank">&#x2197; Source article</a></div>` : ''}

      ${row.qc_feedback ? `<div class="qc-section"><div class="qc-header">QC Feedback</div><div class="qc-text">${formatFeedback(row.qc_feedback)}</div></div>` : ''}

      ${row.notes ? `<div class="qc-section" style="border-color:rgba(85,61,103,0.15)"><div class="qc-header" style="color:#b794d0">Rewrite Notes</div><div class="qc-text">${escapeHtml(row.notes)}</div></div>` : ''}

      ${isPending ? `
      <div class="rewrite-area" id="rewrite-area-${row.id}">
        <textarea class="rewrite-textarea" id="rewrite-${row.id}" placeholder="What changes do you want? e.g. shorter, more stats, different CTA..."></textarea>
        <button class="btn btn-rewrite rewrite-submit" onclick="handleRewrite(${row.id})">Submit Rewrite</button>
      </div>
      <div class="card-actions">
        <button class="btn btn-approve" onclick="confirmApprove(${row.id})">&#x2713; Approve & Schedule</button>
        <button class="btn btn-reject" onclick="handleReject(${row.id})">Reject</button>
        <button class="btn btn-rewrite" onclick="toggleRewrite(${row.id})">&#x270E; Rewrite</button>
      </div>` : ''}

      ${isScheduled ? `
      <div class="card-actions">
        <div class="scheduled-date">&#x1F4C5; Scheduled: ${schedStr}</div>
        <div class="schedule-actions">
          <input type="datetime-local" class="date-input" id="reschedule-${row.id}" value="${schedDate ? schedDate.toISOString().slice(0,16) : ''}">
          <button class="btn btn-rewrite btn-sm" onclick="reschedule(${row.id})">Update Date</button>
          <button class="btn btn-approve btn-sm" onclick="publishNow(${row.id})">Publish Now</button>
          <button class="btn btn-reject btn-sm" onclick="unschedule(${row.id})">Cancel</button>
        </div>
      </div>` : ''}
    </div>`;
  }).join('');
}

function showToast(msg, type) {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function toggleRewrite(id) {
  const area = document.getElementById(`rewrite-area-${id}`);
  area.classList.toggle('show');
  if (area.classList.contains('show')) document.getElementById(`rewrite-${id}`).focus();
}

function disableCard(id) {
  const card = document.getElementById(`card-${id}`);
  if (card) card.querySelectorAll('.btn').forEach(b => b.disabled = true);
}

function confirmApprove(id) {
  const overlay = document.createElement('div');
  overlay.className = 'confirm-overlay';
  overlay.innerHTML = `
    <div class="confirm-box">
      <h3>Schedule for LinkedIn?</h3>
      <p>This will add the post to your publishing queue. It will be auto-published at the next optimal time (weekdays, max 1/day).</p>
      <div class="confirm-actions">
        <button class="btn btn-reject" onclick="this.closest('.confirm-overlay').remove()">Cancel</button>
        <button class="btn btn-approve" onclick="this.closest('.confirm-overlay').remove(); handleApprove(${id})">Schedule</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
}

async function handleApprove(id) {
  disableCard(id);
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/approve`, {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_KEY}` },
      body: JSON.stringify({ draft_id: id })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Failed');
    const when = data.scheduled_for ? new Date(data.scheduled_for).toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' }) : '';
    showToast(`Scheduled for ${when}!`, 'success');
    setTimeout(loadDrafts, 800);
  } catch (err) { showToast('Error: ' + err.message, 'error'); loadDrafts(); }
}

async function publishNow(id) {
  disableCard(id);
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/approve`, {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_KEY}` },
      body: JSON.stringify({ draft_id: id, publish_now: true })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Failed');
    showToast('Published to LinkedIn!', 'success');
    setTimeout(loadDrafts, 800);
  } catch (err) { showToast('Error: ' + err.message, 'error'); loadDrafts(); }
}

async function reschedule(id) {
  const input = document.getElementById(`reschedule-${id}`);
  if (!input.value) return;
  disableCard(id);
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/approve`, {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_KEY}` },
      body: JSON.stringify({ draft_id: id, scheduled_for: new Date(input.value).toISOString() })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Failed');
    showToast('Rescheduled!', 'success');
    setTimeout(loadDrafts, 500);
  } catch (err) { showToast('Error: ' + err.message, 'error'); loadDrafts(); }
}

async function unschedule(id) {
  disableCard(id);
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/linkedin_drafts?id=eq.${id}`, {
      method: 'PATCH', headers: hdrs,
      body: JSON.stringify({ status: 'Pending Review', scheduled_for: null })
    });
    showToast('Unscheduled - moved back to Pending', 'success');
    setTimeout(loadDrafts, 500);
  } catch (err) { showToast('Error: ' + err.message, 'error'); loadDrafts(); }
}

async function handleReject(id) {
  disableCard(id);
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/linkedin_drafts?id=eq.${id}`, { method: 'PATCH', headers: hdrs, body: JSON.stringify({ status: 'Rejected' }) });
    showToast('Draft rejected', 'success');
    setTimeout(loadDrafts, 400);
  } catch (err) { showToast('Error: ' + err.message, 'error'); loadDrafts(); }
}

async function handleRewrite(id) {
  const notes = document.getElementById(`rewrite-${id}`).value.trim();
  if (!notes) return;
  disableCard(id);
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/rewrite`, {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_KEY}` },
      body: JSON.stringify({ draft_id: id, notes })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Failed');
    showToast('Draft rewritten!', 'success');
    setTimeout(loadDrafts, 800);
  } catch (err) { showToast('Error: ' + err.message, 'error'); loadDrafts(); }
}

async function generateDraft() {
  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Generating...';
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/generate-draft`, {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_KEY}`, 'apikey': SUPABASE_KEY }
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Failed');
    showToast(`New draft generated! QC: ${data.qc_score}/10`, 'success');
    loadDrafts();
  } catch (err) { showToast('Error: ' + err.message, 'error'); }
  btn.disabled = false;
  btn.innerHTML = '+ New Draft';
}

async function generateBatch() {
  const btn = document.getElementById('batchBtn');
  btn.disabled = true;
  const total = 5;
  let done = 0;
  btn.innerHTML = `<div class="spinner"></div> 0/${total}`;
  for (let i = 0; i < total; i++) {
    try {
      const res = await fetch(`${SUPABASE_URL}/functions/v1/generate-draft`, {
        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_KEY}`, 'apikey': SUPABASE_KEY }
      });
      const data = await res.json();
      if (!data.ok) { showToast(`Draft ${i+1} failed: ${data.error}`, 'error'); continue; }
      done++;
      btn.innerHTML = `<div class="spinner"></div> ${done}/${total}`;
      loadDrafts();
    } catch (err) { showToast(`Draft ${i+1} error: ${err.message}`, 'error'); }
  }
  showToast(`Generated ${done} of ${total} drafts!`, 'success');
  btn.disabled = false;
  btn.innerHTML = 'Generate 5 Posts';
  loadDrafts();
}

loadDrafts();
</script>

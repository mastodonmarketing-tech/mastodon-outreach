<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mastodon Marketing - LinkedIn Content</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@latest/font/lucide.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; }

/* Header */
.header { background: #553d67; border-bottom: none; padding: 0 32px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
.header-left { display: flex; align-items: center; gap: 12px; }
.logo-icon { width: 36px; height: 36px; background: #ffffff; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; color: #553d67; }
.header h1 { font-size: 17px; font-weight: 600; color: #ffffff; letter-spacing: -0.3px; }
.header h1 span { color: #ffffff; }
.header-actions { display: flex; gap: 8px; }
.btn-header { background: rgba(255,255,255,0.15); color: #ffffff; border: 1px solid rgba(255,255,255,0.3); padding: 7px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; font-family: inherit; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
.btn-header:hover { background: rgba(255,255,255,0.25); border-color: rgba(255,255,255,0.5); }
.btn-header.primary { background: #ffffff; color: #553d67; border-color: #ffffff; font-weight: 700; }
.btn-header.primary:hover { background: #f0f0f0; }

/* Tabs */
.tabs { background: #ffffff; border-bottom: 1px solid #e0e0e0; padding: 0 32px; display: flex; gap: 0; }
.tab { padding: 12px 20px; font-size: 13px; font-weight: 500; color: #888888; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
.tab:hover { color: #553d67; }
.tab.active { color: #553d67; border-bottom-color: #553d67; }
.tab-count { background: #f0f0f0; color: #666666; font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 600; }
.tab.active .tab-count { background: #553d67; color: #ffffff; }

/* Main */
.main { max-width: 960px; margin: 0 auto; padding: 24px 24px 80px; }

/* Empty state */
.empty { text-align: center; padding: 100px 20px; }
.empty-icon { width: 64px; height: 64px; background: #ffffff; border-radius: 16px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.empty h2 { font-size: 20px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
.empty p { color: #666666; font-size: 14px; max-width: 400px; margin: 0 auto; line-height: 1.6; }

/* Cards */
.card { background: #ffffff; border: 1px solid #e0e0e0; border-radius: 14px; margin-bottom: 16px; overflow: hidden; transition: border-color 0.2s, box-shadow 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
.card:hover { border-color: #553d67; box-shadow: 0 4px 16px rgba(85,61,103,0.1); }
.card.published { opacity: 0.7; }
.card.rejected { opacity: 0.5; }

.card-top { padding: 16px 20px; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
.card-top-left { display: flex; flex-direction: column; gap: 8px; }
.card-topic { font-size: 18px; font-weight: 700; color: #1a1a1a; line-height: 1.4; }
.card-badges { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.badge { padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.badge-growth { background: #e8f5e9; color: #2e7d32; }
.badge-authority { background: #ede7f6; color: #553d67; }
.badge-conversion { background: #f3e5f5; color: #7b1fa2; }
.badge-personal { background: #fff3e0; color: #e65100; }
.badge-seo { background: #e3f2fd; color: #1565c0; }
.badge-ai { background: #e0f2fe; color: #075985; }
.badge-marketing { background: #ecfdf5; color: #047857; }
.badge-cro { background: #fef3c7; color: #92400e; }
.badge-contractor { background: #f3e8ff; color: #6b21a8; }
.badge-pending { background: #fff8e1; color: #f57f17; border: 1px solid #ffe082; }
.badge-scheduled { background: #ede7f6; color: #553d67; border: 1px solid #ce93d8; }
.badge-buffer { background: #eef6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
.badge-buffer-scheduled { background: #ecfeff; color: #0f766e; border: 1px solid #99f6e4; }
.badge-buffer-sending { background: #fff7ed; color: #c2410c; border: 1px solid #fdba74; }
.badge-buffer-sent { background: #ecfdf5; color: #047857; border: 1px solid #86efac; }
.badge-buffer-error { background: #fef2f2; color: #b91c1c; border: 1px solid #fca5a5; }
.badge-make { background: #f5f3ff; color: #6d28d9; border: 1px solid #d8b4fe; }
.scheduled-date { font-size: 13px; color: #553d67; font-weight: 600; margin-top: 4px; }
.schedule-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 6px; }
.date-input { padding: 5px 10px; border: 1px solid #d0d0d0; border-radius: 6px; font-size: 12px; font-family: inherit; color: #1a1a1a; background: #fafafa; }
.badge-published { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
.badge-rejected { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
.card-date { font-size: 12px; color: #888888; white-space: nowrap; padding-top: 2px; }

/* Scores */
.scores { display: flex; gap: 16px; padding: 0 20px 12px; }
.score-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #666666; }
.score-value { font-weight: 700; color: #1a1a1a; }
.score-bar { width: 40px; height: 4px; background: #e0e0e0; border-radius: 2px; overflow: hidden; }
.score-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
.score-fill.good { background: #22c55e; }
.score-fill.mid { background: #f59e0b; }
.score-fill.low { background: #ef4444; }

/* Draft content */
.draft-section { padding: 0 20px 16px; }
.draft-text { white-space: pre-wrap; line-height: 1.8; font-size: 15px; color: #1a1a1a; padding: 16px 20px; background: #fafafa; border-radius: 10px; border: 1px solid #e8e8e8; max-height: 350px; overflow-y: auto; }
.draft-text::-webkit-scrollbar { width: 4px; }
.draft-text::-webkit-scrollbar-thumb { background: #cccccc; border-radius: 2px; }

/* Image suggestion */
.image-suggestion { margin: 12px 20px 0; padding: 10px 14px; background: #f3edf6; border: 1px dashed #553d67; border-radius: 8px; font-size: 13px; color: #553d67; display: flex; align-items: flex-start; gap: 8px; }
.image-suggestion::before { content: '🖼'; font-size: 14px; flex-shrink: 0; }

/* Source link */
.source { padding: 0 20px; margin-top: 10px; }
.source a { font-size: 13px; color: #553d67; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; font-weight: 500; }
.source a:hover { color: #6b4f80; text-decoration: underline; }

/* QC Feedback */
.qc-section { margin: 12px 20px 16px; padding: 12px 14px; background: #fafafa; border: 1px solid #e8e8e8; border-radius: 8px; }
.qc-header { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #553d67; margin-bottom: 6px; }
.qc-text { font-size: 13px; color: #333333; line-height: 1.5; }
.first-comment { margin: 12px 20px 16px; padding: 12px 14px; background: #f8f5fa; border: 1px solid rgba(85,61,103,0.18); border-radius: 8px; }
.first-comment-header { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #553d67; margin-bottom: 6px; }
.first-comment-text { font-size: 13px; color: #333333; line-height: 1.5; white-space: pre-wrap; }

/* Actions */
.card-actions { padding: 14px 20px; border-top: 1px solid #e8e8e8; display: flex; gap: 8px; align-items: stretch; flex-wrap: wrap; }
.btn { padding: 8px 18px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; font-family: inherit; display: inline-flex; align-items: center; gap: 6px; }
.btn:active { transform: scale(0.97); }
.btn-approve { background: #00c853; color: #ffffff; font-weight: 700; }
.btn-approve:hover { background: #00e676; box-shadow: 0 4px 16px rgba(0,200,83,0.3); }
.btn-reject { background: #ff1744; color: #ffffff; font-weight: 700; }
.btn-reject:hover { background: #ff5252; box-shadow: 0 4px 16px rgba(255,23,68,0.3); }
.btn-rewrite { background: #553d67; color: #ffffff; font-weight: 700; }
.btn-rewrite:hover { background: #6b4f80; box-shadow: 0 4px 16px rgba(85,61,103,0.3); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* Rewrite area */
.rewrite-area { display: none; padding: 0 20px 16px; }
.rewrite-area.show { display: block; }
.rewrite-textarea { width: 100%; min-height: 80px; padding: 12px; background: #fafafa; border: 1px solid #d0d0d0; border-radius: 8px; color: #1a1a1a; font-size: 13px; font-family: inherit; resize: vertical; line-height: 1.5; }
.rewrite-textarea:focus { outline: none; border-color: #553d67; box-shadow: 0 0 0 3px rgba(85,61,103,0.15); }
.rewrite-submit { margin-top: 8px; }

/* Confirm dialog */
.confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); animation: fadeIn 0.15s; }
.confirm-box { background: #ffffff; border: 1px solid #e0e0e0; border-radius: 14px; padding: 24px; max-width: 400px; width: 90%; max-height: 90vh; overflow-y: auto; box-shadow: 0 16px 48px rgba(0,0,0,0.15); }
.confirm-box h3 { font-size: 16px; color: #1a1a1a; margin-bottom: 8px; }
.confirm-box p { font-size: 14px; color: #666666; line-height: 1.5; margin-bottom: 20px; }
.confirm-actions { display: flex; gap: 8px; justify-content: flex-end; }

/* Toast */
.toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; z-index: 200; animation: slideUp 0.3s ease; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
.toast-success { background: #00c853; color: #ffffff; }
.toast-error { background: #ff1744; color: #ffffff; }

/* Loading spinner */
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(85,61,103,0.3); border-top-color: #553d67; border-radius: 50%; animation: spin 0.6s linear infinite; }
.loading-state { text-align: center; padding: 80px 20px; color: #888888; }
.loading-state .spinner { width: 32px; height: 32px; border-width: 3px; margin-bottom: 16px; }

/* Calendar */
.calendar-toolbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 14px; }
.calendar-title { font-size: 20px; font-weight: 700; color: #1a1a1a; }
.calendar-actions { display: flex; gap: 8px; align-items: center; }
.calendar-btn { width: 34px; height: 34px; border: 1px solid #d8d8d8; background: #ffffff; color: #553d67; border-radius: 8px; font-size: 18px; cursor: pointer; font-family: inherit; display: inline-flex; align-items: center; justify-content: center; }
.calendar-btn:hover { border-color: #553d67; background: #f8f5fa; }
.calendar-btn.today { width: auto; padding: 0 12px; font-size: 13px; font-weight: 600; }
.calendar-shell { background: #ffffff; border: 1px solid #e0e0e0; border-radius: 8px; overflow: visible; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
.calendar-weekdays { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); border-bottom: 1px solid #e8e8e8; background: #fafafa; }
.calendar-weekday { padding: 10px 8px; font-size: 11px; color: #666666; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; text-align: center; }
.calendar-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); overflow: visible; }
.calendar-day { min-height: 122px; padding: 8px; border-right: 1px solid #eeeeee; border-bottom: 1px solid #eeeeee; position: relative; background: #ffffff; }
.calendar-day:nth-child(7n) { border-right: none; }
.calendar-day.muted { background: #fafafa; color: #aaaaaa; }
.calendar-day.today { background: #f8f5fa; }
.calendar-day-number { font-size: 12px; font-weight: 700; margin-bottom: 6px; color: #666666; }
.calendar-day.today .calendar-day-number { color: #553d67; }
.calendar-event { position: relative; width: 100%; padding: 6px 7px; margin-bottom: 6px; background: #553d67; color: #ffffff; border-radius: 6px; cursor: default; text-align: left; box-shadow: 0 2px 8px rgba(85,61,103,0.16); }
.calendar-event.published { background: #9e9e9e; color: #ffffff; opacity: 0.72; box-shadow: none; }
.calendar-event:hover, .calendar-event:focus { z-index: 90; }
.calendar-event:focus { outline: 2px solid #c7a7dc; outline-offset: 2px; }
.calendar-event-top { display: flex; align-items: center; justify-content: space-between; gap: 6px; margin-bottom: 2px; }
.calendar-event-time { display: block; font-size: 10px; font-weight: 700; opacity: 0.9; margin-bottom: 2px; }
.calendar-event-title { display: block; font-size: 11px; line-height: 1.25; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.calendar-queue-badge { flex-shrink: 0; display: inline-flex; align-items: center; gap: 4px; padding: 2px 5px; border-radius: 999px; background: rgba(255,255,255,0.16); border: 1px solid rgba(255,255,255,0.26); font-size: 9px; font-weight: 700; letter-spacing: 0.2px; line-height: 1; white-space: nowrap; }
.calendar-queue-badge::before { content: ''; width: 5px; height: 5px; border-radius: 999px; background: #99f6e4; box-shadow: 0 0 0 2px rgba(153,246,228,0.18); }
.calendar-event.published .calendar-queue-badge { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.22); }
.calendar-event.published .calendar-queue-badge::before { background: #d1d5db; box-shadow: none; }
.calendar-preview { display: none; position: absolute; left: 0; top: calc(100% - 1px); width: min(380px, 80vw); max-height: min(520px, 72vh); overflow-y: auto; padding: 12px; background: #ffffff; color: #1a1a1a; border: 1px solid #d8d8d8; border-radius: 8px; box-shadow: 0 16px 40px rgba(0,0,0,0.18); z-index: 80; cursor: auto; }
.calendar-preview.above { top: auto; bottom: calc(100% - 1px); }
.calendar-preview.align-right { left: auto; right: 0; }
.calendar-event:hover .calendar-preview, .calendar-event:focus .calendar-preview { display: block; }
.calendar-preview-title { display: block; font-size: 13px; line-height: 1.35; font-weight: 700; margin-bottom: 6px; color: #1a1a1a; }
.calendar-preview-meta { display: block; font-size: 11px; font-weight: 700; color: #553d67; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.4px; }
.calendar-preview-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.calendar-preview-image { width: 100%; aspect-ratio: 16 / 9; object-fit: cover; border-radius: 6px; border: 1px solid #e0e0e0; margin-bottom: 10px; display: block; }
.calendar-preview-text { display: block; font-size: 12px; line-height: 1.55; color: #333333; white-space: pre-wrap; }
.calendar-preview-actions { position: sticky; top: -12px; z-index: 2; display: flex; flex-wrap: wrap; gap: 6px; margin: 0 -12px 10px; padding: 10px 12px; background: #ffffff; border-bottom: 1px solid #eeeeee; box-shadow: 0 6px 12px rgba(255,255,255,0.95); }
.calendar-action { border: 1px solid #d8d8d8; background: #ffffff; color: #553d67; border-radius: 6px; padding: 5px 8px; font-size: 11px; font-weight: 700; font-family: inherit; cursor: pointer; }
.calendar-action:hover { background: #f8f5fa; border-color: #553d67; }
.calendar-action.danger { color: #c62828; border-color: #ef9a9a; }
.calendar-action.danger:hover { background: #ffebee; }
.modal-textarea { width: 100%; min-height: 260px; padding: 12px; background: #fafafa; border: 1px solid #d0d0d0; border-radius: 8px; color: #1a1a1a; font-size: 13px; font-family: inherit; resize: vertical; line-height: 1.5; margin: 12px 0; }
.modal-textarea.comment { min-height: 90px; }
.modal-textarea:focus { outline: none; border-color: #553d67; box-shadow: 0 0 0 3px rgba(85,61,103,0.15); }
.modal-image { width: 100%; border-radius: 8px; border: 1px solid #e0e0e0; margin-top: 12px; display: block; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes spin { to { transform: rotate(360deg); } }

/* Mobile */
@media (max-width: 640px) {
  .header { padding: 0 16px; }
  .tabs { padding: 0 16px; overflow-x: auto; }
  .main { padding: 16px; }
  .card-top { flex-direction: column; }
  .scores { flex-wrap: wrap; }
  .card-actions { flex-direction: column; }
  .btn { justify-content: center; }
  .calendar-toolbar { align-items: flex-start; flex-direction: column; }
  .calendar-weekday { padding: 8px 2px; font-size: 10px; }
  .calendar-day { min-height: 92px; padding: 5px; }
  .calendar-event { padding: 5px; }
  .calendar-event-title { font-size: 10px; }
  .calendar-preview { position: fixed; left: 12px; right: 12px; top: auto; bottom: 16px; width: auto; max-height: 45vh; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo-icon">M</div>
    <h1><span>Mastodon</span> LinkedIn</h1>
  </div>
  <div class="header-actions">
    <button class="btn-header" onclick="loadDrafts()" id="refreshBtn">Refresh</button>
    <button class="btn-header" onclick="generateDraft()" id="generateBtn">+ New Draft</button>
    <button class="btn-header primary" onclick="generateBatch()" id="batchBtn">Generate 5 Posts</button>
  </div>
</div>

<div class="tabs" id="tabs">
  <div class="tab active" data-filter="all">Needs Attention <span class="tab-count" id="count-all">0</span></div>
  <div class="tab" data-filter="pending">Pending <span class="tab-count" id="count-pending">0</span></div>
  <div class="tab" data-filter="scheduled">Scheduled <span class="tab-count" id="count-scheduled">0</span></div>
  <div class="tab" data-filter="calendar">Calendar <span class="tab-count" id="count-calendar">0</span></div>
  <div class="tab" data-filter="published">Published <span class="tab-count" id="count-published">0</span></div>
  <div class="tab" data-filter="rejected">Rejected <span class="tab-count" id="count-rejected">0</span></div>
</div>

<div class="main" id="main">
  <div class="loading-state"><div class="spinner"></div><br>Loading drafts...</div>
</div>

<script>
const SUPABASE_URL = 'https://vaaudpclqxaqzlryhhlm.supabase.co';
const SUPABASE_KEY = 'sb_publishable_SHsVFBB_I639cZwJSM2NEQ_1RsFon5a';

const hdrs = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' };
const fnHdrs = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' };
let allDrafts = [];
let currentFilter = 'all';
let calendarMonth = new Date();
calendarMonth.setDate(1);

// Tabs
document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  const previousFilter = currentFilter;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentFilter = tab.dataset.filter;
  if (currentFilter === 'calendar' && previousFilter !== 'calendar') setCalendarToRelevantMonth();
  renderDrafts();
});

function escapeHtml(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }
function escapeAttr(s) { return escapeHtml(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function getStatus(s) {
  if (!s) return 'pending';
  const l = s.toLowerCase();
  if (l.includes('scheduled')) return 'scheduled';
  if (l.includes('publish')) return 'published';
  if (l.includes('reject')) return 'rejected';
  return 'pending';
}

function formatDraft(text) {
  if (!text) return '';
  let imageMatch = text.match(/\[IMAGE:([^\]]+)\]/i);
  let imageSuggestion = imageMatch ? imageMatch[1].trim() : null;
  let clean = text
    .replace(/\[IMAGE:[^\]]+\]\s*/gi, '')
    .replace(/^Source:\s*https?:\/\/\S+\s*$/gim, '')
    .trim();
  return { clean: escapeHtml(clean), imageSuggestion };
}

function cleanDraftText(text) {
  return text ? String(text)
    .replace(/\[IMAGE:[^\]]+\]\s*/gi, '')
    .replace(/^Source:\s*https?:\/\/\S+\s*$/gim, '')
    .trim() : '';
}

function getDeliveryBadge(row) {
  const provider = String(row.publishing_provider || '').toLowerCase();
  const bufferStatus = String(row.buffer_status || '').toLowerCase();
  if (provider === 'buffer') {
    if (bufferStatus === 'error') return { label: 'Buffer Error', className: 'badge-buffer-error', title: row.buffer_error || 'Buffer reported an error' };
    if (bufferStatus === 'sent') return { label: 'Buffer Sent', className: 'badge-buffer-sent', title: 'Published via Buffer' };
    if (bufferStatus === 'sending') return { label: 'Buffer Sending', className: 'badge-buffer-sending', title: 'Buffer is sending this post' };
    if (bufferStatus === 'scheduled') return { label: 'Buffer Queued', className: 'badge-buffer-scheduled', title: 'Scheduled in Buffer' };
    return { label: 'Buffer', className: 'badge-buffer', title: 'Managed in Buffer' };
  }
  if (provider === 'make') {
    return { label: 'Make', className: 'badge-make', title: 'Published via Make' };
  }
  return null;
}

function renderDeliveryBadge(row) {
  const badge = getDeliveryBadge(row);
  if (!badge) return '';
  return `<span class="badge ${badge.className}" title="${escapeAttr(badge.title || badge.label)}">${escapeHtml(badge.label)}</span>`;
}

function renderCalendarQueueBadge(row) {
  const provider = String(row.publishing_provider || '').toLowerCase();
  const bufferStatus = String(row.buffer_status || '').toLowerCase();
  if (provider === 'buffer' && ['scheduled', 'sending', 'sent'].includes(bufferStatus)) {
    return `<span class="calendar-queue-badge" title="${escapeAttr(bufferStatus === 'sent' ? 'Queued in Buffer and already delivered' : 'Queued in Buffer')}">Buffer</span>`;
  }
  return '';
}

function findDraft(id) {
  return allDrafts.find(r => Number(r.id) === Number(id));
}

function formatFeedback(fb) {
  if (!fb) return '';
  try {
    if (fb.startsWith('{')) {
      const obj = JSON.parse(fb);
      if (obj.feedback) return escapeHtml(obj.feedback);
      let parts = [];
      for (const [k, v] of Object.entries(obj)) {
        if (typeof v === 'object' && v.score) parts.push(`${k.replace(/_/g,' ')}: ${v.score}/10`);
      }
      return parts.length ? parts.join(' | ') : escapeHtml(fb);
    }
  } catch {}
  return escapeHtml(fb.substring(0, 300));
}

function scoreColor(score) {
  if (score >= 7) return 'good';
  if (score >= 5) return 'mid';
  return 'low';
}

function sameDay(a, b) {
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}

function positionCalendarPreview(eventEl) {
  const preview = eventEl.querySelector('.calendar-preview');
  if (!preview) return;
  preview.classList.remove('above', 'align-right');
  preview.style.maxHeight = '';

  const eventRect = eventEl.getBoundingClientRect();
  const preferredHeight = Math.min(520, Math.round(window.innerHeight * 0.72));
  const spaceAbove = eventRect.top;
  const spaceBelow = window.innerHeight - eventRect.bottom;
  const spaceRight = window.innerWidth - eventRect.left;
  const openAbove = spaceBelow < preferredHeight + 16 && spaceAbove > spaceBelow;
  const availableSpace = openAbove ? spaceAbove : spaceBelow;
  const cappedHeight = Math.max(220, Math.min(preferredHeight, availableSpace - 16));

  if (openAbove) {
    preview.classList.add('above');
  }
  if (spaceRight < 400 && eventRect.right > 380) {
    preview.classList.add('align-right');
  }
  preview.style.maxHeight = `${cappedHeight}px`;
}

function monthLabel(d) {
  return d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
}

function shiftCalendarMonth(delta) {
  calendarMonth = new Date(calendarMonth.getFullYear(), calendarMonth.getMonth() + delta, 1);
  renderDrafts();
}

function showCurrentMonth() {
  calendarMonth = new Date();
  calendarMonth.setDate(1);
  renderDrafts();
}

function formatScheduledTime(date) {
  return date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}

function calendarDayKey(date) {
  return `${date.getFullYear()}-${date.getMonth()}-${date.getDate()}`;
}

function getCalendarDate(row) {
  const status = getStatus(row.status);
  const rawDate = status === 'published'
    ? (row.scheduled_date || row.scheduled_for || row.created_at)
    : row.scheduled_for;
  if (!rawDate) return null;
  const date = new Date(rawDate);
  return Number.isNaN(date.getTime()) ? null : date;
}

function setCalendarToRelevantMonth() {
  const calendarRows = allDrafts
    .map(row => ({ row, status: getStatus(row.status), date: getCalendarDate(row) }))
    .filter(item => item.date && (item.status === 'scheduled' || item.status === 'published'))
    .sort((a, b) => a.date - b.date);
  if (!calendarRows.length) return;
  const now = new Date();
  const nextScheduled = calendarRows.find(item => item.status === 'scheduled' && item.date >= now);
  const publishedRows = calendarRows.filter(item => item.status === 'published');
  const latestPublished = publishedRows[publishedRows.length - 1];
  const target = nextScheduled || latestPublished || calendarRows[0];
  const d = target.date;
  calendarMonth = new Date(d.getFullYear(), d.getMonth(), 1);
}

function renderCalendar() {
  const main = document.getElementById('main');
  const calendarRows = allDrafts
    .map(row => ({ row, status: getStatus(row.status), date: getCalendarDate(row) }))
    .filter(item => item.date && (item.status === 'scheduled' || item.status === 'published'))
    .sort((a, b) => a.date - b.date);

  const start = new Date(calendarMonth.getFullYear(), calendarMonth.getMonth(), 1);
  const gridStart = new Date(start);
  gridStart.setDate(start.getDate() - start.getDay());
  const today = new Date();
  const weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const rowsByDay = new Map();

  calendarRows.forEach(item => {
    const key = calendarDayKey(item.date);
    if (!rowsByDay.has(key)) rowsByDay.set(key, []);
    rowsByDay.get(key).push(item);
  });

  const cells = [];
  for (let i = 0; i < 42; i++) {
    const day = new Date(gridStart);
    day.setDate(gridStart.getDate() + i);
    const inMonth = day.getMonth() === calendarMonth.getMonth();
    const events = rowsByDay.get(calendarDayKey(day)) || [];

    cells.push(`
      <div class="calendar-day ${inMonth ? '' : 'muted'} ${sameDay(day, today) ? 'today' : ''}">
        <div class="calendar-day-number">${day.getDate()}</div>
        ${events.map(item => {
          const row = item.row;
          const scheduled = item.date;
          const isPublished = item.status === 'published';
          const draftText = cleanDraftText(row.draft);
          const preview = escapeHtml(draftText);
          const topic = escapeHtml(row.topic || 'Untitled Draft');
          const attrTopic = escapeAttr(row.topic || 'Untitled Draft');
          const bucket = escapeHtml(row.bucket || 'N/A');
          const statusLabel = isPublished ? 'Posted' : 'Scheduled';
          const deliveryBadge = renderDeliveryBadge(row);
          const queueBadge = renderCalendarQueueBadge(row);
          const image = row.image_url ? `<img class="calendar-preview-image" src="${escapeAttr(row.image_url)}" alt="">` : '';
          const firstComment = row.first_comment ? `<span class="first-comment" style="display:block;margin:10px 0 0"><span class="first-comment-header">First Comment</span><span class="first-comment-text">${escapeHtml(row.first_comment)}</span></span>` : '';
          const actions = isPublished ? '' : `
                <span class="calendar-preview-actions">
                  <button class="calendar-action" type="button" onclick="event.stopPropagation(); openEditModal(${row.id})">Edit</button>
                  <button class="calendar-action" type="button" onclick="event.stopPropagation(); openRewriteModal(${row.id})">Rewrite</button>
                  <button class="calendar-action" type="button" onclick="event.stopPropagation(); regenerateImage(${row.id})">Regenerate Image</button>
                  <button class="calendar-action" type="button" onclick="event.stopPropagation(); rescheduleNext(${row.id})">Next Slot</button>
                  <button class="calendar-action danger" type="button" onclick="event.stopPropagation(); deleteDraft(${row.id})">Delete</button>
                </span>`;
          return `
            <div class="calendar-event ${isPublished ? 'published' : 'scheduled'}" tabindex="0" aria-label="${attrTopic}" onmouseenter="positionCalendarPreview(this)" onfocus="positionCalendarPreview(this)">
              <span class="calendar-event-top">
                <span class="calendar-event-time">${isPublished ? 'Posted' : formatScheduledTime(scheduled)}</span>
                ${queueBadge}
              </span>
              <span class="calendar-event-title">${topic}</span>
              <span class="calendar-preview">
                <span class="calendar-preview-title">${topic}</span>
                <span class="calendar-preview-meta">${statusLabel} | ${bucket} | ${scheduled.toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' })} at ${formatScheduledTime(scheduled)}</span>
                ${deliveryBadge ? `<span class="calendar-preview-badges">${deliveryBadge}</span>` : ''}
                ${actions}
                ${image}
                <span class="calendar-preview-text">${preview}</span>
                ${firstComment}
              </span>
            </div>`;
        }).join('')}
      </div>`);
  }

  main.innerHTML = `
    <div class="calendar-toolbar">
      <div class="calendar-title">${monthLabel(calendarMonth)}</div>
      <div class="calendar-actions">
        <button class="calendar-btn" type="button" onclick="shiftCalendarMonth(-1)" aria-label="Previous month">&#8249;</button>
        <button class="calendar-btn today" type="button" onclick="showCurrentMonth()">Today</button>
        <button class="calendar-btn" type="button" onclick="shiftCalendarMonth(1)" aria-label="Next month">&#8250;</button>
      </div>
    </div>
    <div class="calendar-shell">
      <div class="calendar-weekdays">${weekdays.map(day => `<div class="calendar-weekday">${day}</div>`).join('')}</div>
      <div class="calendar-grid">${cells.join('')}</div>
    </div>`;
}

async function loadDrafts() {
  const main = document.getElementById('main');
  main.innerHTML = '<div class="loading-state"><div class="spinner"></div><br>Loading drafts...</div>';
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/linkedin_drafts?order=created_at.desc`, { headers: hdrs });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || data.error || 'Could not load drafts');
    if (!Array.isArray(data)) throw new Error('Draft response was not a list');
    allDrafts = data;
    renderDrafts();
  } catch (err) {
    main.innerHTML = `<div class="empty"><div class="empty-icon">!</div><h2>Could not load drafts</h2><p>${err.message}</p></div>`;
  }
}

function renderDrafts() {
  const main = document.getElementById('main');
  let pending = 0, published = 0, rejected = 0, scheduled = 0;
  allDrafts.forEach(r => { const s = getStatus(r.status); if (s === 'scheduled') scheduled++; else if (s === 'published') published++; else if (s === 'rejected') rejected++; else pending++; });

  document.getElementById('count-all').textContent = pending;
  document.getElementById('count-pending').textContent = pending;
  document.getElementById('count-scheduled').textContent = scheduled;
  document.getElementById('count-calendar').textContent = scheduled + published;
  document.getElementById('count-published').textContent = published;
  document.getElementById('count-rejected').textContent = rejected;

  if (currentFilter === 'calendar') {
    renderCalendar();
    return;
  }

  const filtered = currentFilter === 'all' ? allDrafts.filter(r => getStatus(r.status) === 'pending') : allDrafts.filter(r => getStatus(r.status) === currentFilter);

  if (!filtered.length) {
    const msgs = { all: ['📝', 'Needs Attention', 'No posts need your attention right now. Click "+ New Draft" to generate one.'], pending: ['⏳', 'pending', 'No drafts with this status yet.'], scheduled: ['📅', 'scheduled', 'No posts scheduled yet. Approve a pending draft to schedule it.'], published: ['✅', 'published', 'No posts published yet.'], rejected: ['🗑', 'rejected', 'No rejected posts.'] };
    const m = msgs[currentFilter] || msgs.all;
    main.innerHTML = `<div class="empty"><div class="empty-icon">${m[0]}</div><h2>No ${m[1]} drafts</h2><p>${m[2]}</p></div>`;
    return;
  }

  main.innerHTML = filtered.map(row => {
    const status = getStatus(row.status);
    const { clean, imageSuggestion } = formatDraft(row.draft);
    const date = row.created_at ? new Date(row.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';
    const qc = row.qc_score ? parseFloat(row.qc_score) : 0;
    const isPending = status === 'pending';
    const isScheduled = status === 'scheduled';
    const schedDate = row.scheduled_for ? new Date(row.scheduled_for) : null;
    const schedStr = schedDate ? schedDate.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' }) + ' at ' + schedDate.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' }) : '';

    return `
    <div class="card ${status}" id="card-${row.id}">
      <div class="card-top">
        <div class="card-top-left">
          <div class="card-topic">${escapeHtml(row.topic) || 'Untitled Draft'}</div>
          <div class="card-badges">
            <span class="badge badge-${(row.bucket||'').toLowerCase()}">${row.bucket || 'N/A'}</span>
            <span class="badge badge-${status}">${row.status || 'Pending Review'}</span>
            ${renderDeliveryBadge(row)}
          </div>
        </div>
        <span class="card-date">${date}</span>
      </div>

      <div class="scores">
        <div class="score-item">QC <span class="score-value">${qc || '?'}/10</span>
          <div class="score-bar"><div class="score-fill ${scoreColor(qc)}" style="width:${qc*10}%"></div></div>
        </div>
        <div class="score-item">Urgency <span class="score-value">${row.urgency || '?'}/10</span>
          <div class="score-bar"><div class="score-fill ${scoreColor(row.urgency)}" style="width:${(row.urgency||0)*10}%"></div></div>
        </div>
      </div>

      <div class="draft-section">
        <div class="draft-text">${clean}</div>
      </div>

      ${row.image_url ? `<div style="padding:0 20px;margin-top:12px"><img src="${escapeHtml(row.image_url)}" style="width:100%;border-radius:10px;border:1px solid #e0e0e0" alt="Post image"></div>` : ''}
      ${imageSuggestion && !row.image_url ? `<div class="image-suggestion">${escapeHtml(imageSuggestion)}</div>` : ''}
      ${row.first_comment ? `<div class="first-comment"><div class="first-comment-header">First Comment</div><div class="first-comment-text">${escapeHtml(row.first_comment)}</div></div>` : ''}

      ${row.source_url ? `<div class="source"><a href="${escapeHtml(row.source_url)}" target="_blank">&#x2197; Source article</a></div>` : ''}

      ${row.qc_feedback ? `<div class="qc-section"><div class="qc-header">QC Feedback</div><div class="qc-text">${formatFeedback(row.qc_feedback)}</div></div>` : ''}

      ${row.notes ? `<div class="qc-section" style="border-color:rgba(85,61,103,0.15)"><div class="qc-header" style="color:#b794d0">Rewrite Notes</div><div class="qc-text">${escapeHtml(row.notes)}</div></div>` : ''}

      ${isPending ? `
      <div class="rewrite-area" id="rewrite-area-${row.id}">
        <textarea class="rewrite-textarea" id="rewrite-${row.id}" placeholder="What changes do you want? e.g. shorter, more stats, different CTA..."></textarea>
        <button class="btn btn-rewrite rewrite-submit" onclick="handleRewrite(${row.id})">Submit Rewrite</button>
      </div>
      <div class="card-actions">
        <button class="btn btn-approve" onclick="confirmApprove(${row.id})">&#x2713; Approve & Schedule</button>
        <button class="btn btn-reject" onclick="handleReject(${row.id})">Reject</button>
        <button class="btn btn-rewrite" onclick="toggleRewrite(${row.id})">&#x270E; Rewrite</button>
      </div>` : ''}

      ${isScheduled ? `
      <div class="card-actions">
        <div class="scheduled-date">&#x1F4C5; Scheduled: ${schedStr}</div>
        <div class="schedule-actions">
          <input type="datetime-local" class="date-input" id="reschedule-${row.id}" value="${schedDate ? schedDate.toISOString().slice(0,16) : ''}">
          <button class="btn btn-rewrite btn-sm" onclick="reschedule(${row.id})">Update Date</button>
          <button class="btn btn-approve btn-sm" onclick="publishNow(${row.id})">Publish Now</button>
          <button class="btn btn-reject btn-sm" onclick="unschedule(${row.id})">Cancel</button>
        </div>
      </div>` : ''}
    </div>`;
  }).join('');
}

function showToast(msg, type) {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function openModal(title, bodyHtml, actionsHtml) {
  const overlay = document.createElement('div');
  overlay.className = 'confirm-overlay';
  overlay.innerHTML = `
    <div class="confirm-box" style="max-width:680px">
      <h3>${escapeHtml(title)}</h3>
      ${bodyHtml}
      <div class="confirm-actions">${actionsHtml}</div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  return overlay;
}

function openEditModal(id) {
  const row = findDraft(id);
  if (!row) return;
  const body = `
    ${row.image_url ? `<img class="modal-image" src="${escapeAttr(row.image_url)}" alt="">` : ''}
    <textarea class="modal-textarea" id="edit-draft-${id}">${escapeHtml(cleanDraftText(row.draft))}</textarea>
    <div class="first-comment-header">First Comment</div>
    <textarea class="modal-textarea comment" id="edit-comment-${id}">${escapeHtml(row.first_comment || '')}</textarea>`;
  const actions = `
    <button class="btn btn-reject" onclick="this.closest('.confirm-overlay').remove()">Cancel</button>
    <button class="btn btn-approve" onclick="saveEdit(${id}, this)">Save Edit</button>`;
  const overlay = openModal('Edit Post', body, actions);
  setTimeout(() => overlay.querySelector(`#edit-draft-${id}`)?.focus(), 0);
}

function openRewriteModal(id) {
  const row = findDraft(id);
  if (!row) return;
  const body = `
    ${row.image_url ? `<img class="modal-image" src="${escapeAttr(row.image_url)}" alt="">` : ''}
    <textarea class="modal-textarea" id="rewrite-notes-${id}" placeholder="What should change? e.g. make it sharper, more specific, less salesy..."></textarea>`;
  const actions = `
    <button class="btn btn-reject" onclick="this.closest('.confirm-overlay').remove()">Cancel</button>
    <button class="btn btn-rewrite" onclick="submitRewrite(${id}, this)">Rewrite</button>`;
  const overlay = openModal('Rewrite Post', body, actions);
  setTimeout(() => overlay.querySelector(`#rewrite-notes-${id}`)?.focus(), 0);
}

async function saveEdit(id, btn) {
  const draft = document.getElementById(`edit-draft-${id}`).value.trim();
  const firstComment = document.getElementById(`edit-comment-${id}`).value.trim();
  if (!draft) return;
  btn.disabled = true;
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/rewrite`, {
      method: 'POST', headers: fnHdrs,
      body: JSON.stringify({ draft_id: id, action: 'edit', draft, first_comment: firstComment })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Failed');
    btn.closest('.confirm-overlay').remove();
    showToast('Post edited', 'success');
    loadDrafts();
  } catch (err) {
    showToast('Error: ' + err.message, 'error');
    btn.disabled = false;
  }
}

async function submitRewrite(id, btn) {
  const notes = document.getElementById(`rewrite-notes-${id}`).value.trim();
  if (!notes) return;
  btn.disabled = true;
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/rewrite`, {
      method: 'POST', headers: fnHdrs,
      body: JSON.stringify({ draft_id: id, notes })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Failed');
    btn.closest('.confirm-overlay').remove();
    showToast('Post rewritten', 'success');
    loadDrafts();
  } catch (err) {
    showToast('Error: ' + err.message, 'error');
    btn.disabled = false;
  }
}

async function regenerateImage(id) {
  try {
    showToast('Regenerating image...', 'success');
    const res = await fetch(`${SUPABASE_URL}/functions/v1/rewrite`, {
      method: 'POST', headers: fnHdrs,

    });

    if (!data.ok) throw new Error(data.error || 'Failed');
    showToast('Image regenerated', 'success');

    showToast('Error: ' + err.message, 'error');
  }
}

async function rescheduleNext(id) {
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/approve`, {
      method: 'POST', headers: fnHdrs,
      body: JSON.stringify({ draft_id: id, action: 'next_slot' })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Failed');
    showToast('Moved to next open slot', 'success');

function deleteDraft(id) {
  const row = findDraft(id);
  const title = row?.topic || 'this post';
  const actions = `
    <button class="btn btn-rewrite" onclick="this.closest('.confirm-overlay').remove()">Cancel</button>
    <button class="btn btn-reject" onclick="confirmDeleteDraft(${id}, this)">Delete</button>`;
  openModal('Delete Post?', `<p>Delete ${escapeHtml(title)} permanently?</p>`, actions);
}

async function confirmDeleteDraft(id, btn) {
  btn.disabled = true;
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/approve`, {
      method: 'POST', headers: fnHdrs,
      body: JSON.stringify({ draft_id: id, action: 'delete' })
    });
    const data = await res.json();

    showToast('Post deleted', 'success');
    loadDrafts();

function toggleRewrite(id) {
  const area = document.getElementById(`rewrite-area-${id}`);
  area.classList.toggle('show');
  if (area.classList.contains('show')) document.getElementById(`rewrite-${id}`).focus();
}

function disableCard(id) {
  const card = document.getElementById(`card-${id}`);
  if (card) card.querySelectorAll('.btn').forEach(b => b.disabled = true);
}

function confirmApprove(id) {
  const overlay = document.createElement('div');
  overlay.className = 'confirm-overlay';
  overlay.innerHTML = `
    <div class="confirm-box">
      <h3>Schedule for LinkedIn?</h3>
      <p>This will add the post to Buffer's queue and let Buffer assign the next recommended posting time.</p>
      <div class="confirm-actions">
        <button class="btn btn-reject" onclick="this.closest('.confirm-overlay').remove()">Cancel</button>
        <button class="btn btn-approve" onclick="this.closest('.confirm-overlay').remove(); handleApprove(${id})">Schedule</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
}

async function handleApprove(id) {
  disableCard(id);
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/approve`, {
      method: 'POST', headers: fnHdrs,
      body: JSON.stringify({ draft_id: id })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Failed');
    const when = data.scheduled_for ? new Date(data.scheduled_for).toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' }) : '';
    showToast(`Scheduled for ${when}!`, 'success');
    setTimeout(loadDrafts, 800);
  } catch (err) { showToast('Error: ' + err.message, 'error'); loadDrafts(); }
}

async function publishNow(id) {
  disableCard(id);
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/approve`, {
      method: 'POST', headers: fnHdrs,
      body: JSON.stringify({ draft_id: id, publish_now: true })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Failed');
    showToast('Published to LinkedIn!', 'success');
    setTimeout(loadDrafts, 800);
  } catch (err) { showToast('Error: ' + err.message, 'error'); loadDrafts(); }
}

async function reschedule(id) {
  const input = document.getElementById(`reschedule-${id}`);
  if (!input.value) return;
  disableCard(id);
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/approve`, {
      method: 'POST', headers: fnHdrs,

    if (!data.ok) throw new Error(data.error || 'Failed');
    showToast('Rescheduled!', 'success');

  } catch (err) { showToast('Error: ' + err.message, 'error'); loadDrafts(); }
}

async function unschedule(id) {
  disableCard(id);
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/approve`, {
      method: 'POST', headers: fnHdrs,
      body: JSON.stringify({ draft_id: id, action: 'unschedule' })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Failed');
    showToast('Unscheduled - moved back to Pending', 'success');
    setTimeout(loadDrafts, 500);
  } catch (err) { showToast('Error: ' + err.message, 'error'); loadDrafts(); }
}

async function handleReject(id) {
  disableCard(id);
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/approve`, {
      method: 'POST', headers: fnHdrs,
      body: JSON.stringify({ draft_id: id, action: 'reject' })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Failed');
    showToast('Draft rejected', 'success');
    setTimeout(loadDrafts, 400);
  } catch (err) { showToast('Error: ' + err.message, 'error'); loadDrafts(); }
}

async function handleRewrite(id) {
  const notes = document.getElementById(`rewrite-${id}`).value.trim();
  if (!notes) return;
  disableCard(id);
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/rewrite`, {
      method: 'POST', headers: fnHdrs,
      body: JSON.stringify({ draft_id: id, notes })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Failed');
    showToast('Draft rewritten!', 'success');
    setTimeout(loadDrafts, 800);
  } catch (err) { showToast('Error: ' + err.message, 'error'); loadDrafts(); }
}

async function generateDraft() {
  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Generating...';
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/generate-draft`, {
      method: 'POST', headers: fnHdrs
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Failed');
    showToast(`New draft generated! QC: ${data.qc_score}/10`, 'success');
    loadDrafts();
  } catch (err) { showToast('Error: ' + err.message, 'error'); }
  btn.disabled = false;
  btn.innerHTML = '+ New Draft';
}

async function generateBatch() {
  const btn = document.getElementById('batchBtn');
  btn.disabled = true;
  const total = 5;
  let done = 0;
  btn.innerHTML = `<div class="spinner"></div> 0/${total}`;
  const wait = (ms) => new Promise(r => setTimeout(r, ms));
  for (let i = 0; i < total; i++) {
    if (i > 0) await wait(5000);
    try {
      const res = await fetch(`${SUPABASE_URL}/functions/v1/generate-draft`, {
        method: 'POST', headers: fnHdrs
      });
      const data = await res.json();
      if (!data.ok) { showToast(`Draft ${i+1} failed: ${data.error}`, 'error'); continue; }
      done++;
      btn.innerHTML = `<div class="spinner"></div> ${done}/${total}`;
      loadDrafts();
    } catch (err) { showToast(`Draft ${i+1} error: ${err.message}`, 'error'); }
  }
  showToast(`Generated ${done} of ${total} drafts!`, 'success');
  btn.disabled = false;
  btn.innerHTML = 'Generate 5 Posts';
  loadDrafts();
}

loadDrafts();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mastodon Marketing - LinkedIn Content</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@latest/font/lucide.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, sans-serif; background: #000000; color: #f0f0f0; min-height: 100vh; }

/* Header */
.header { background: #0a0a0a; border-bottom: 1px solid rgba(85,61,103,0.4); padding: 0 32px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; backdrop-filter: blur(12px); }
.header-left { display: flex; align-items: center; gap: 12px; }
.logo-icon { width: 36px; height: 36px; background: #553d67; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; color: white; }
.header h1 { font-size: 17px; font-weight: 600; color: #ffffff; letter-spacing: -0.3px; }
.header h1 span { color: #553d67; }
.header-actions { display: flex; gap: 8px; }
.btn-header { background: rgba(85,61,103,0.15); color: #b794d0; border: 1px solid rgba(85,61,103,0.35); padding: 7px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; font-family: inherit; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
.btn-header:hover { background: rgba(85,61,103,0.3); border-color: rgba(85,61,103,0.5); }
.btn-header.primary { background: #553d67; color: white; border-color: #553d67; }
.btn-header.primary:hover { background: #6b4f80; }

/* Tabs */
.tabs { background: #080808; border-bottom: 1px solid #1a1a1a; padding: 0 32px; display: flex; gap: 0; }
.tab { padding: 12px 20px; font-size: 13px; font-weight: 500; color: #64748b; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
.tab:hover { color: #94a3b8; }
.tab.active { color: #ffffff; border-bottom-color: #553d67; }
.tab-count { background: #1a1a1a; color: #94a3b8; font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 600; }
.tab.active .tab-count { background: rgba(85,61,103,0.25); color: #b794d0; }

/* Main */
.main { max-width: 960px; margin: 0 auto; padding: 24px 24px 80px; }

/* Empty state */
.empty { text-align: center; padding: 100px 20px; }
.empty-icon { width: 64px; height: 64px; background: #1a1a1a; border-radius: 16px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 28px; }
.empty h2 { font-size: 20px; font-weight: 700; color: #ffffff; margin-bottom: 8px; }
.empty p { color: #999999; font-size: 14px; max-width: 400px; margin: 0 auto; line-height: 1.6; }

/* Cards */
.card { background: #121212; border: 1px solid #2a2a2a; border-radius: 14px; margin-bottom: 16px; overflow: hidden; transition: border-color 0.2s, transform 0.2s; }
.card:hover { border-color: #2a2a3a; }
.card.published { opacity: 0.65; }
.card.rejected { opacity: 0.5; }

.card-top { padding: 16px 20px; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
.card-top-left { display: flex; flex-direction: column; gap: 8px; }
.card-topic { font-size: 18px; font-weight: 700; color: #ffffff; line-height: 1.4; }
.card-badges { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.badge { padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.badge-growth { background: rgba(16,185,129,0.12); color: #6ee7b7; }
.badge-authority { background: rgba(85,61,103,0.12); color: #b794d0; }
.badge-conversion { background: rgba(168,85,247,0.12); color: #c4b5fd; }
.badge-personal { background: rgba(245,158,11,0.12); color: #fcd34d; }
.badge-seo { background: rgba(59,130,246,0.12); color: #93c5fd; }
.badge-pending { background: rgba(245,158,11,0.1); color: #fbbf24; border: 1px solid rgba(245,158,11,0.2); }
.badge-published { background: rgba(34,197,94,0.1); color: #4ade80; border: 1px solid rgba(34,197,94,0.2); }
.badge-rejected { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
.card-date { font-size: 12px; color: #aaaaaa; white-space: nowrap; padding-top: 2px; }

/* Scores */
.scores { display: flex; gap: 16px; padding: 0 20px 12px; }
.score-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #cccccc; }
.score-value { font-weight: 700; color: #ffffff; }
.score-bar { width: 40px; height: 4px; background: #1a1a1a; border-radius: 2px; overflow: hidden; }
.score-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
.score-fill.good { background: #22c55e; }
.score-fill.mid { background: #f59e0b; }
.score-fill.low { background: #ef4444; }

/* Draft content */
.draft-section { padding: 0 20px 16px; }
.draft-text { white-space: pre-wrap; line-height: 1.8; font-size: 15px; color: #ffffff; padding: 16px 20px; background: #080808; border-radius: 10px; border: 1px solid #1f1f1f; max-height: 350px; overflow-y: auto; }
.draft-text::-webkit-scrollbar { width: 4px; }
.draft-text::-webkit-scrollbar-thumb { background: #444444; border-radius: 2px; }

/* Image suggestion */
.image-suggestion { margin: 12px 20px 0; padding: 10px 14px; background: rgba(85,61,103,0.1); border: 1px dashed rgba(85,61,103,0.35); border-radius: 8px; font-size: 13px; color: #d4b8e8; display: flex; align-items: flex-start; gap: 8px; }
.image-suggestion::before { content: '🖼'; font-size: 14px; flex-shrink: 0; }

/* Source link */
.source { padding: 0 20px; margin-top: 10px; }
.source a { font-size: 13px; color: #b794d0; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
.source a:hover { color: #b794d0; text-decoration: underline; }

/* QC Feedback */
.qc-section { margin: 12px 20px 16px; padding: 12px 14px; background: rgba(245,158,11,0.04); border: 1px solid rgba(245,158,11,0.1); border-radius: 8px; }
.qc-header { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #b794d0; margin-bottom: 6px; }
.qc-text { font-size: 13px; color: #e0e0e0; line-height: 1.5; }

/* Actions */
.card-actions { padding: 14px 20px; border-top: 1px solid #1f1f1f; display: flex; gap: 8px; align-items: stretch; flex-wrap: wrap; }
.btn { padding: 8px 18px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; font-family: inherit; display: inline-flex; align-items: center; gap: 6px; }
.btn:active { transform: scale(0.97); }
.btn-approve { background: #00e676; color: #000000; font-weight: 700; }
.btn-approve:hover { background: #00ff88; box-shadow: 0 0 24px rgba(0,230,118,0.3); }
.btn-reject { background: #ff1744; color: #ffffff; font-weight: 700; }
.btn-reject:hover { background: #ff5252; box-shadow: 0 0 24px rgba(255,23,68,0.3); }
.btn-rewrite { background: #553d67; color: #ffffff; font-weight: 700; }
.btn-rewrite:hover { background: #6b4f80; box-shadow: 0 0 24px rgba(85,61,103,0.3); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* Rewrite area */
.rewrite-area { display: none; padding: 0 20px 16px; }
.rewrite-area.show { display: block; }
.rewrite-textarea { width: 100%; min-height: 80px; padding: 12px; background: #080808; border: 1px solid #2a2a3a; border-radius: 8px; color: #e2e8f0; font-size: 13px; font-family: inherit; resize: vertical; line-height: 1.5; }
.rewrite-textarea:focus { outline: none; border-color: #553d67; box-shadow: 0 0 0 3px rgba(85,61,103,0.1); }
.rewrite-submit { margin-top: 8px; }

/* Confirm dialog */
.confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); animation: fadeIn 0.15s; }
.confirm-box { background: #1f1f1f; border: 1px solid #2a2a3a; border-radius: 14px; padding: 24px; max-width: 400px; width: 90%; }
.confirm-box h3 { font-size: 16px; color: #f1f5f9; margin-bottom: 8px; }
.confirm-box p { font-size: 14px; color: #94a3b8; line-height: 1.5; margin-bottom: 20px; }
.confirm-actions { display: flex; gap: 8px; justify-content: flex-end; }

/* Toast */
.toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; z-index: 200; animation: slideUp 0.3s ease; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
.toast-success { background: #22c55e; color: #052e16; }
.toast-error { background: #ef4444; color: #fff; }

/* Loading spinner */
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; }
.loading-state { text-align: center; padding: 80px 20px; color: #64748b; }
.loading-state .spinner { width: 32px; height: 32px; border-width: 3px; margin-bottom: 16px; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes spin { to { transform: rotate(360deg); } }

/* Mobile */
@media (max-width: 640px) {
  .header { padding: 0 16px; }
  .tabs { padding: 0 16px; overflow-x: auto; }
  .main { padding: 16px; }
  .card-top { flex-direction: column; }
  .scores { flex-wrap: wrap; }
  .card-actions { flex-direction: column; }
  .btn { justify-content: center; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo-icon">M</div>
    <h1><span>Mastodon</span> LinkedIn</h1>
  </div>
  <div class="header-actions">
    <button class="btn-header" onclick="loadDrafts()" id="refreshBtn">Refresh</button>
    <button class="btn-header primary" onclick="generateDraft()" id="generateBtn">+ New Draft</button>
  </div>
</div>

<div class="tabs" id="tabs">
  <div class="tab active" data-filter="all">All <span class="tab-count" id="count-all">0</span></div>
  <div class="tab" data-filter="pending">Pending <span class="tab-count" id="count-pending">0</span></div>
  <div class="tab" data-filter="published">Published <span class="tab-count" id="count-published">0</span></div>
  <div class="tab" data-filter="rejected">Rejected <span class="tab-count" id="count-rejected">0</span></div>
</div>

<div class="main" id="main">
  <div class="loading-state"><div class="spinner"></div><br>Loading drafts...</div>
</div>

<script>
const SUPABASE_URL = 'https://vaaudpclqxaqzlryhhlm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZhYXVkcGNscXhhcXpscnloaGxtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMzc3NDEsImV4cCI6MjA5MTcxMzc0MX0.R7iLNsyHAc-Ky_ri1tP5DovcECYu_jTqpi1-3GjobJg';

const hdrs = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' };
let allDrafts = [];
let currentFilter = 'all';

// Tabs
document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentFilter = tab.dataset.filter;
  renderDrafts();
});

function escapeHtml(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

function getStatus(s) {
  if (!s) return 'pending';
  const l = s.toLowerCase();
  if (l.includes('publish')) return 'published';
  if (l.includes('reject')) return 'rejected';
  return 'pending';
}

function formatDraft(text) {
  if (!text) return '';
  let imageMatch = text.match(/\[IMAGE:([^\]]+)\]/i);
  let imageSuggestion = imageMatch ? imageMatch[1].trim() : null;
  let clean = text.replace(/\[IMAGE:[^\]]+\]\s*/gi, '').trim();
  return { clean: escapeHtml(clean), imageSuggestion };
}

function formatFeedback(fb) {
  if (!fb) return '';
  try {
    if (fb.startsWith('{')) {
      const obj = JSON.parse(fb);
      if (obj.feedback) return escapeHtml(obj.feedback);
      let parts = [];
      for (const [k, v] of Object.entries(obj)) {
        if (typeof v === 'object' && v.score) parts.push(`${k.replace(/_/g,' ')}: ${v.score}/10`);
      }
      return parts.length ? parts.join(' | ') : escapeHtml(fb);
    }
  } catch {}
  return escapeHtml(fb.substring(0, 300));
}

function scoreColor(score) {
  if (score >= 7) return 'good';
  if (score >= 5) return 'mid';
  return 'low';
}

async function loadDrafts() {
  const main = document.getElementById('main');
  main.innerHTML = '<div class="loading-state"><div class="spinner"></div><br>Loading drafts...</div>';
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/linkedin_drafts?order=created_at.desc`, { headers: hdrs });
    allDrafts = await res.json();
    renderDrafts();
  } catch (err) {
    main.innerHTML = `<div class="empty"><div class="empty-icon">!</div><h2>Could not load drafts</h2><p>${err.message}</p></div>`;
  }
}

function renderDrafts() {
  const main = document.getElementById('main');
  let pending = 0, published = 0, rejected = 0;
  allDrafts.forEach(r => { const s = getStatus(r.status); if (s === 'published') published++; else if (s === 'rejected') rejected++; else pending++; });

  document.getElementById('count-all').textContent = allDrafts.length;
  document.getElementById('count-pending').textContent = pending;
  document.getElementById('count-published').textContent = published;
  document.getElementById('count-rejected').textContent = rejected;

  const filtered = currentFilter === 'all' ? allDrafts : allDrafts.filter(r => getStatus(r.status) === currentFilter);

  if (!filtered.length) {
    main.innerHTML = `<div class="empty"><div class="empty-icon">${currentFilter === 'all' ? '📝' : currentFilter === 'pending' ? '⏳' : currentFilter === 'published' ? '✅' : '🗑'}</div><h2>No ${currentFilter === 'all' ? '' : currentFilter + ' '}drafts</h2><p>${currentFilter === 'all' ? 'Click "+ New Draft" to generate one, or wait for the next scheduled run (Mon/Wed/Fri 6AM CT)' : 'No drafts with this status yet.'}</p></div>`;
    return;
  }

  main.innerHTML = filtered.map(row => {
    const status = getStatus(row.status);
    const { clean, imageSuggestion } = formatDraft(row.draft);
    const date = row.created_at ? new Date(row.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';
    const qc = row.qc_score ? parseFloat(row.qc_score) : 0;
    const isPending = status === 'pending';

    return `
    <div class="card ${status}" id="card-${row.id}">
      <div class="card-top">
        <div class="card-top-left">
          <div class="card-topic">${escapeHtml(row.topic) || 'Untitled Draft'}</div>
          <div class="card-badges">
            <span class="badge badge-${(row.bucket||'').toLowerCase()}">${row.bucket || 'N/A'}</span>
            <span class="badge badge-${status}">${row.status || 'Pending Review'}</span>
          </div>
        </div>
        <span class="card-date">${date}</span>
      </div>

      <div class="scores">
        <div class="score-item">QC <span class="score-value">${qc || '?'}/10</span>
          <div class="score-bar"><div class="score-fill ${scoreColor(qc)}" style="width:${qc*10}%"></div></div>
        </div>
        <div class="score-item">Urgency <span class="score-value">${row.urgency || '?'}/10</span>
          <div class="score-bar"><div class="score-fill ${scoreColor(row.urgency)}" style="width:${(row.urgency||0)*10}%"></div></div>
        </div>
      </div>

      <div class="draft-section">
        <div class="draft-text">${clean}</div>
      </div>

      ${imageSuggestion ? `<div class="image-suggestion">${escapeHtml(imageSuggestion)}</div>` : ''}

      ${row.source_url ? `<div class="source"><a href="${escapeHtml(row.source_url)}" target="_blank">&#x2197; Source article</a></div>` : ''}

      ${row.qc_feedback ? `<div class="qc-section"><div class="qc-header">QC Feedback</div><div class="qc-text">${formatFeedback(row.qc_feedback)}</div></div>` : ''}

      ${row.notes ? `<div class="qc-section" style="border-color:rgba(85,61,103,0.15)"><div class="qc-header" style="color:#b794d0">Rewrite Notes</div><div class="qc-text">${escapeHtml(row.notes)}</div></div>` : ''}

      ${isPending ? `
      <div class="rewrite-area" id="rewrite-area-${row.id}">
        <textarea class="rewrite-textarea" id="rewrite-${row.id}" placeholder="What changes do you want? e.g. shorter, more stats, different CTA..."></textarea>
        <button class="btn btn-rewrite rewrite-submit" onclick="handleRewrite(${row.id})">Submit Rewrite</button>
      </div>
      <div class="card-actions">
        <button class="btn btn-approve" onclick="confirmApprove(${row.id})">&#x2713; Approve & Publish</button>
        <button class="btn btn-reject" onclick="handleReject(${row.id})">Reject</button>
        <button class="btn btn-rewrite" onclick="toggleRewrite(${row.id})">&#x270E; Rewrite</button>
      </div>` : ''}
    </div>`;
  }).join('');
}

function showToast(msg, type) {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function toggleRewrite(id) {
  const area = document.getElementById(`rewrite-area-${id}`);
  area.classList.toggle('show');
  if (area.classList.contains('show')) document.getElementById(`rewrite-${id}`).focus();
}

function disableCard(id) {
  const card = document.getElementById(`card-${id}`);
  if (card) card.querySelectorAll('.btn').forEach(b => b.disabled = true);
}

function confirmApprove(id) {
  const overlay = document.createElement('div');
  overlay.className = 'confirm-overlay';
  overlay.innerHTML = `
    <div class="confirm-box">
      <h3>Publish to LinkedIn?</h3>
      <p>This will post the draft to your LinkedIn profile immediately. This action cannot be undone.</p>
      <div class="confirm-actions">
        <button class="btn btn-reject" onclick="this.closest('.confirm-overlay').remove()">Cancel</button>
        <button class="btn btn-approve" onclick="this.closest('.confirm-overlay').remove(); handleApprove(${id})">Publish Now</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
}

async function handleApprove(id) {
  disableCard(id);
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/approve`, {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_KEY}` },
      body: JSON.stringify({ draft_id: id })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Failed');
    showToast('Published to LinkedIn!', 'success');
    setTimeout(loadDrafts, 800);
  } catch (err) { showToast('Error: ' + err.message, 'error'); loadDrafts(); }
}

async function handleReject(id) {
  disableCard(id);
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/linkedin_drafts?id=eq.${id}`, { method: 'PATCH', headers: hdrs, body: JSON.stringify({ status: 'Rejected' }) });
    showToast('Draft rejected', 'success');
    setTimeout(loadDrafts, 400);
  } catch (err) { showToast('Error: ' + err.message, 'error'); loadDrafts(); }
}

async function handleRewrite(id) {
  const notes = document.getElementById(`rewrite-${id}`).value.trim();
  if (!notes) return;
  disableCard(id);
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/rewrite`, {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_KEY}` },
      body: JSON.stringify({ draft_id: id, notes })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Failed');
    showToast('Draft rewritten!', 'success');
    setTimeout(loadDrafts, 800);
  } catch (err) { showToast('Error: ' + err.message, 'error'); loadDrafts(); }
}

async function generateDraft() {
  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Generating...';
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/generate-draft`, {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_KEY}`, 'apikey': SUPABASE_KEY }
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Failed');
    showToast(`New draft generated! QC: ${data.qc_score}/10`, 'success');
    loadDrafts();
  } catch (err) { showToast('Error: ' + err.message, 'error'); }
  btn.disabled = false;
  btn.innerHTML = '+ New Draft';
}

loadDrafts();
</script>
</body>
</html>

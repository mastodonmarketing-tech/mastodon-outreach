<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mastodon Marketing - LinkedIn Drafts</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
.header { background: #1e293b; border-bottom: 1px solid #334155; padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 20px; font-weight: 600; color: #f8fafc; }
.header .logo { color: #818cf8; font-weight: 700; }
.header .refresh { background: #334155; color: #e2e8f0; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }
.header .refresh:hover { background: #475569; }
.status-bar { background: #1e293b; padding: 12px 32px; display: flex; gap: 16px; border-bottom: 1px solid #334155; font-size: 13px; color: #94a3b8; }
.status-bar .stat { display: flex; align-items: center; gap: 6px; }
.status-bar .dot { width: 8px; height: 8px; border-radius: 50%; }
.dot-pending { background: #f59e0b; }
.dot-published { background: #22c55e; }
.dot-rejected { background: #ef4444; }
.container { max-width: 900px; margin: 0 auto; padding: 24px; }
.empty { text-align: center; padding: 80px 20px; color: #64748b; }
.empty h2 { font-size: 18px; margin-bottom: 8px; color: #94a3b8; }
.card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; margin-bottom: 20px; overflow: hidden; }
.card-header { padding: 16px 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
.card-meta { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.badge-growth { background: #064e3b; color: #6ee7b7; }
.badge-authority { background: #1e1b4b; color: #a5b4fc; }
.badge-conversion { background: #4c1d95; color: #c4b5fd; }
.badge-personal { background: #78350f; color: #fcd34d; }
.badge-pending { background: #422006; color: #f59e0b; }
.badge-published { background: #052e16; color: #22c55e; }
.badge-rejected { background: #450a0a; color: #ef4444; }
.badge-rewrite { background: #172554; color: #60a5fa; }
.qc-score { font-size: 13px; color: #94a3b8; }
.qc-score strong { color: #f8fafc; }
.card-date { font-size: 12px; color: #64748b; }
.card-body { padding: 20px; }
.draft-text { white-space: pre-wrap; line-height: 1.7; font-size: 14px; color: #cbd5e1; max-height: 400px; overflow-y: auto; padding: 16px; background: #0f172a; border-radius: 8px; border: 1px solid #1e293b; }
.card-footer { padding: 16px 20px; border-top: 1px solid #334155; display: flex; gap: 10px; align-items: center; }
.btn { padding: 8px 20px; border-radius: 6px; border: none; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
.btn-approve { background: #22c55e; color: #052e16; }
.btn-approve:hover { background: #16a34a; }
.btn-reject { background: #ef4444; color: #fff; }
.btn-reject:hover { background: #dc2626; }
.btn-rewrite { background: #3b82f6; color: #fff; }
.btn-rewrite:hover { background: #2563eb; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.rewrite-input { flex: 1; padding: 8px 12px; background: #0f172a; border: 1px solid #475569; border-radius: 6px; color: #e2e8f0; font-size: 13px; display: none; }
.rewrite-input.show { display: block; }
.source-link { font-size: 12px; color: #818cf8; text-decoration: none; margin-top: 12px; display: inline-block; }
.source-link:hover { text-decoration: underline; }
.feedback { font-size: 13px; color: #94a3b8; margin-top: 12px; padding: 10px; background: #0f172a; border-radius: 6px; border-left: 3px solid #f59e0b; }
.loading { text-align: center; padding: 60px; color: #64748b; }
.toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; z-index: 100; animation: slideIn 0.3s ease; }
.toast-success { background: #22c55e; color: #052e16; }
.toast-error { background: #ef4444; color: #fff; }
@keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
</style>
</head>
<body>
<div class="header">
  <h1><span class="logo">MASTODON</span> LinkedIn Dashboard</h1>
  <button class="refresh" onclick="loadDrafts()">Refresh</button>
</div>
<div class="status-bar" id="statusBar"></div>
<div class="container" id="container">
  <div class="loading">Loading drafts...</div>
</div>

<script>
const SUPABASE_URL = 'https://vaaudpclqxaqzlryhhlm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZhYXVkcGNscXhhcXpscnloaGxtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMzc3NDEsImV4cCI6MjA5MTcxMzc0MX0.R7iLNsyHAc-Ky_ri1tP5DovcECYu_jTqpi1-3GjobJg';
// Edge Functions replace Make.com webhook

const headers = {
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Content-Type': 'application/json',
  'Prefer': 'return=minimal'
};

function showToast(message, type) {
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function getBucketClass(bucket) {
  if (!bucket) return 'badge-pending';
  return 'badge-' + bucket.toLowerCase();
}

function getStatusClass(status) {
  if (!status) return 'badge-pending';
  const s = status.toLowerCase();
  if (s.includes('publish')) return 'badge-published';
  if (s.includes('reject')) return 'badge-rejected';
  if (s.includes('rewrite')) return 'badge-rewrite';
  return 'badge-pending';
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function supaFetch(path, options = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, { headers, ...options });
  if (!res.ok) throw new Error(`Supabase error: ${res.status}`);
  if (res.status === 204) return null;
  return res.json();
}

async function loadDrafts() {
  const container = document.getElementById('container');
  container.innerHTML = '<div class="loading">Loading drafts...</div>';

  try {
    const rows = await supaFetch('linkedin_drafts?order=created_at.desc');

    let pending = 0, published = 0, rejected = 0;
    let html = '';

    for (const row of rows) {
      const isPending = !row.status || row.status === 'Pending Review' || row.status === 'Manual Rewrite Needed';
      if (row.status && row.status.toLowerCase().includes('publish')) published++;
      else if (row.status && row.status.toLowerCase().includes('reject')) rejected++;
      else pending++;

      const date = row.created_at ? new Date(row.created_at).toLocaleDateString() : '';

      html += `
        <div class="card" id="card-${row.id}">
          <div class="card-header">
            <div class="card-meta">
              <span class="badge ${getBucketClass(row.bucket)}">${row.bucket || 'N/A'}</span>
              <span class="badge ${getStatusClass(row.status)}">${row.status || 'Pending Review'}</span>
              <span class="qc-score">QC: <strong>${row.qc_score || '?'}/10</strong></span>
              <span class="qc-score">Urgency: <strong>${row.urgency || '?'}/10</strong></span>
            </div>
            <span class="card-date">${date}</span>
          </div>
          <div class="card-body">
            <div class="draft-text">${escapeHtml(row.draft)}</div>
            ${row.source_url ? `<a href="${escapeHtml(row.source_url)}" target="_blank" class="source-link">Source article</a>` : ''}
            ${row.qc_feedback ? `<div class="feedback"><strong>QC Feedback:</strong> ${escapeHtml(row.qc_feedback)}</div>` : ''}
          </div>
          ${isPending ? `
          <div class="card-footer">
            <button class="btn btn-approve" onclick="handleApprove(${row.id}, this)">Approve & Publish</button>
            <button class="btn btn-reject" onclick="handleReject(${row.id}, this)">Reject</button>
            <button class="btn btn-rewrite" onclick="toggleRewrite(${row.id})">Rewrite</button>
            <input type="text" class="rewrite-input" id="rewrite-${row.id}" placeholder="Type rewrite instructions, then press Enter" onkeydown="if(event.key==='Enter') handleRewrite(${row.id}, this)">
          </div>` : ''}
        </div>`;
    }

    if (!html) {
      html = '<div class="empty"><h2>No drafts yet</h2><p>Drafts will appear here after the next scheduled run (Mon/Wed/Fri 6AM CT)</p></div>';
    }

    container.innerHTML = html;
    document.getElementById('statusBar').innerHTML = `
      <div class="stat"><span class="dot dot-pending"></span> ${pending} Pending</div>
      <div class="stat"><span class="dot dot-published"></span> ${published} Published</div>
      <div class="stat"><span class="dot dot-rejected"></span> ${rejected} Rejected</div>
    `;
  } catch (err) {
    container.innerHTML = `<div class="empty"><h2>Could not load drafts</h2><p style="margin-top:8px;font-size:12px;color:#ef4444">${err.message}</p></div>`;
  }
}

function toggleRewrite(id) {
  const input = document.getElementById(`rewrite-${id}`);
  input.classList.toggle('show');
  if (input.classList.contains('show')) input.focus();
}

function disableButtons(id) {
  const card = document.getElementById(`card-${id}`);
  if (card) card.querySelectorAll('.btn').forEach(b => b.disabled = true);
}

async function handleApprove(id, btn) {
  disableButtons(id);
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/approve`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_KEY}` },
      body: JSON.stringify({ draft_id: id })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Approve failed');
    showToast('Published to LinkedIn!', 'success');
    setTimeout(loadDrafts, 1000);
  } catch (err) {
    showToast('Error: ' + err.message, 'error');
    loadDrafts();
  }
}

async function handleReject(id, btn) {
  disableButtons(id);
  try {
    await supaFetch(`linkedin_drafts?id=eq.${id}`, {
      method: 'PATCH',
      body: JSON.stringify({ status: 'Rejected' })
    });
    showToast('Post rejected', 'success');
    setTimeout(loadDrafts, 500);
  } catch (err) {
    showToast('Error: ' + err.message, 'error');
    loadDrafts();
  }
}

async function handleRewrite(id, input) {
  const notes = input.value.trim();
  if (!notes) return;
  disableButtons(id);
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/rewrite`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_KEY}` },
      body: JSON.stringify({ draft_id: id, notes: notes })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Rewrite failed');
    showToast('Draft rewritten!', 'success');
    setTimeout(loadDrafts, 1000);
  } catch (err) {
    showToast('Error: ' + err.message, 'error');
    loadDrafts();
  }
}

loadDrafts();
</script>
</body>
</html>
